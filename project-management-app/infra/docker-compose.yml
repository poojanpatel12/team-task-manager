version: '3.8'

services:
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ../backend
      dockerfile: ../infra/docker/Dockerfile.backend
    ports:
      - '5000:5000'
    environment:
      - MONGODB_URI=mongodb://mongo:27017/team-task-manager
      - JWT_SECRET=${JWT_SECRET:-supersecretjwtkey}
      - NODE_ENV=production
    depends_on:
      - mongo

  frontend:
    build:
      context: ../frontend
      dockerfile: ../infra/docker/Dockerfile.frontend
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  mongo_data:
